# CI: build, lint, test, typecheck. Runs on PR and push to main.
# Skip on doc-only changes (paths-ignore). Concurrency cancels in-flight runs.

name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "*.png"
      - "*.svg"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "*.png"
      - "*.svg"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - run: npm run build
      - name: Smoke test (built server)
        env:
          AGENT_JWT_SECRET: ci-smoke
          CLASPER_TEST_MODE: "true"
        run: |
          node dist/server/index.js &
          PID=$!
          sleep 4
          curl -sf http://localhost:8081/health || { kill $PID 2>/dev/null; exit 1; }
          kill $PID 2>/dev/null || true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - run: npm test

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
